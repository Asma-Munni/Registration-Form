<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <!--Daisy UI-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!--font family-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
 
<style>
    *{
      font-family: "Inter", sans-serif;   
    }
</style>

</head>
<body class="bg-slate-100 ">
   
    <section id="signUp ">
        <div class=" md:flex  w-[1280px] max-h-[675px] container items-center justify-center   mx-auto"> 
            <div class="text bg-[#005ce0] h-[675px] flex flex-col items-center justify-center space-y-2 p-6 text-center">
            <h1 class="text-white text-[40px] font-semibold">Welcome Back!</h1>
            <p class="text-white font-semibold text-[18px]">To Keep connected with us please
login <br>with your personal details</p>
          <button class="btn bg-[#498ae7] text-[#fafbfe] mt-4 rounded-[30px]">Sign In</button>
        </div>
        <!--right side-->
        <div class="account flex flex-col items-center justify-center space-y-2 p-6 text-center bg-white">
            <h1 class="text-[#000000] font-bold text-[32px]">Create your Account</h1>
        <div class="flex items-center gap-0 ">
            <p>Already have an account?</p>
        <a href="" class="text-[#005ce0] font-semibold">Sign Up</a>
        </div>
        <!--buttons-->
         <button class=" bg-[#fafbfe] w-full p-4  text-[#00000050%] rounded-[40px] mt-4 border border-[#d9d9d9] ">Usename</button>

         <div class="flex justify-between items-center gap-8">
             <button class=" bg-[#fafbfe] w-full px-8 py-3  text-[#00000050%] rounded-[40px] mt-4 border border-[#d9d9d9]">Firstname</button>
              <button class=" bg-[#fafbfe] w-full px-8 py-3 text-[#000000/50] text-opacity-50 rounded-[40px] mt-4 border border-[#d9d9d9] ">Lastname</button>
         </div>
          <button class=" bg-[#fafbfe] w-full p-4  text-[#000000] rounded-[40px] mt-4 border border-[#d9d9d9]">Email</button>
           <button class=" bg-[#fafbfe] w-full p-4 flex justify-between items-center text-[#000000] rounded-[40px] mt-4 border border-[#d9d9d9]">Password <img src="./images/Blind.png" alt=""></button>
            <button class="btn bg-[#498ae7] text-[#ffffff] mt-4 rounded-[30px]">Sign Up</button>
    </div>
        
    </div>
       
    </section>
</body>
</html>
